---
name: 'Deploy Staging'

on:
  push:
    branches:
      - develop

# Only allow one deployment at a time. Cancel the others
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Cloning repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to dokku
        uses: dokku/github-action@cc7dec1d2b9fed249a14ae462bc953bba436f78c # v1.10.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_DOKKU_SSH_PRIVATE_KEY }}
        with:
          branch: develop
          git_push_flags: '--force'
          git_remote_url: 'ssh://dokku@staging.djangonaut.space:22/staging'
          ssh_private_key: ${{ env.SSH_PRIVATE_KEY }}
