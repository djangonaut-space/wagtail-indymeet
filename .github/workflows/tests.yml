name: Run tests

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  build:
    env:
      ENVIRONMENT: 'test'
      DJANGO_SETTINGS_MODULE: 'indymeet.settings.test'
      DATABASE_URL: "postgres://djangonaut:djangonaut@localhost:5432/djangonaut-space"
      DEBUG: False
      SECRET_KEY: "hunter2"
      RECAPTCHA_PUBLIC_KEY: "dummy_value"
      RECAPTCHA_PRIVATE_KEY: "dummy_value"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      pg:
        image: postgres:17
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: "djangonaut"
          POSTGRES_PASSWORD: "djangonaut"
          POSTGRES_DB: "djangonaut-space"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python version
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'theme/static_src/package.json'
          cache: 'npm'
          cache-dependency-path: 'theme/static_src/package.json'

      - name: Install python dependencies
        run: |
          uv sync --frozen --extra test
          uv run playwright install

      - name: Build Tailwind CSS
        run: |
          npm ci
          uv run python manage.py tailwind build

      - name: Run tests
        run: uv run pytest --cov --cov-branch --cov-report=xml --cov-report=term

      - name: Run playwright tests
        run: >-
          uv run pytest
          --tracing retain-on-failure
          -m playwright
          --browser webkit
          --browser firefox
          --browser chromium
          --cov
          --cov-branch
          --cov-report=xml
          --cov-append
          --cov-report=term

      - name: Upload results to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        name: Upload playwright traces
        if: ${{ !cancelled() }}
        with:
          name: playwright-traces
          path: test-results/
